name: Deploy to Firebase Hosting on push to main

on:
  push:
    branches:
      - main   # change this to "master" below if your default branch is called master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RICE_SHOP_59C6A }}'
          channelId: live
          projectId: rice-shop-59c6a
